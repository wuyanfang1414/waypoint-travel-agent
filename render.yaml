services:
  - type: web
    name: waypoint-travel-agent
    runtime: python
    buildCommand: ""
    startCommand: python server.py --host 0.0.0.0
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
